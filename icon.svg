<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1b3a"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#faf8f2"/>
      <stop offset="60%" stop-color="#e8e0c8"/>
      <stop offset="100%" stop-color="#c8b880"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="148" cy="38" r="1.5" fill="#d4d8e8" opacity="0.6"/>
  <circle cx="162" cy="58" r="1" fill="#d4d8e8" opacity="0.4"/>
  <circle cx="38" cy="52" r="1.2" fill="#d4d8e8" opacity="0.5"/>
  <circle cx="155" cy="148" r="1" fill="#d4d8e8" opacity="0.4"/>
  <circle cx="32" cy="140" r="1.5" fill="#d4d8e8" opacity="0.5"/>
  <circle cx="50" cy="160" r="1" fill="#d4d8e8" opacity="0.3"/>
  <circle cx="170" cy="110" r="1.2" fill="#d4d8e8" opacity="0.4"/>

  <!-- Crescent moon -->
  <g filter="url(#glow)">
    <!-- Full circle (lit) -->
    <circle cx="96" cy="96" r="52" fill="url(#moon)"/>
    <!-- Dark overlay to create crescent -->
    <circle cx="114" cy="90" r="44" fill="#05060f"/>
  </g>

  <!-- Subtle gold ring hint -->
  <circle cx="96" cy="96" r="52" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
</svg>
